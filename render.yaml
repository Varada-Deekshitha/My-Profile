services:
  - type: web
    name: my-profile-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py migrate --run-syncdb && python manage.py seed"
    startCommand: "gunicorn wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: settings
      - key: EMAIL_HOST_PASSWORD
        value: mygg tzkg qqtl xuyq
      - key: PYTHON_VERSION
        value: "3.11.0"
